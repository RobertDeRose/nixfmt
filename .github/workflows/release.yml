name: Release on Version Change

on:
  push:
    branches:
      - master
    paths:
      - 'nixfmt.cabal'

defaults:
  run:
    shell: bash

jobs:
  check-if-version-changed:
    name: Check if version changed
    permissions:
      contents: read

    runs-on: ubuntu-latest
    outputs:
      prev_version: ${{ steps.get_version.outputs.prev_version }}
      version: ${{ steps.get_version.outputs.version }}
      version_changed: ${{ steps.get_version.outputs.version_changed }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need previous commit for comparison
          persist-credentials: false

      - name: Get version from nixfmt.cabal
        id: get_version
        run: |
          CABAL_FILE="nixfmt.cabal"

          # Extract the version
          VERSION=$(grep -m1 "^version:" $CABAL_FILE | awk '{print $2}')
          echo "Version found in cabal: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get previous version from last commit
          PREV_VERSION=$(git show HEAD~1:"$CABAL_FILE" | grep -m1 "^version:" | awk '{print $2}')
          echo "Previous version: $PREV_VERSION"

          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          if [ "$PREV_VERSION" != "$VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "::notice ::Version changed from $PREV_VERSION to $VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "::notice ::Version did not change"
          fi

      - name: Extract changelog section for current version
        if: steps.get_version.outputs.version_changed == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^##[[:space:]]+" ver {found=1; next}
            found && /^##[[:space:]]+/ {exit}
            found
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning ::No changelog section found for version $VERSION"
            echo "(Make sure you have a header like '## $VERSION -- YYYY-MM-DD')"
            exit 1
          fi

      - name: Upload release notes
        if: steps.get_version.outputs.version_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: RELEASE_NOTES.md
          path: RELEASE_NOTES.md


  release-if-version-changed:
    needs: check-if-version-changed
    if: needs.check-if-version-changed.outputs.version_changed == 'true'
    name: Building ${{ needs.check-if-version-changed.outputs.version }} for ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - macos-15
          - macos-15-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nixos-nixfmt
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build
        run: |
          attr="packages.nixfmt"
          [ "$(uname -s)" = "Linux" ] && attr+="-static"

          nix-build -A "$attr"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nixfmt-${{ runner.os }}-${{ runner.arch }}
          path: ./result/bin/nixfmt

  Create-GitHub-Release:
    needs:
      - release-if-version-changed
      - check-if-version-changed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-if-version-changed.outputs.version }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"

          chmod +x artifacts/nixfmt-*
          gh release create "$TAG" artifacts/nixfmt-* \
            --title "$TAG" \
            --notes-file artifacts/RELEASE_NOTES.md
